services:
  postgres:
    image: postgres:17
    environment:
      POSTGRES_USER: engine
      POSTGRES_PASSWORD: engine
      POSTGRES_DB: engine
    ports:
      - "5432:5432"
    healthcheck: 
      test: ["CMD-SHELL", "pg_isready -U engine -d engine"]
      interval: 2s 
      timeout: 2s
      retries: 30

  api:
    build: .
    environment:
      DATABASE_URL: postgresql://engine:engine@postgres:5432/engine
      WEBHOOK_DESTINATION_URL: https://receiver:9000/webhook
    depends_on:
      postgres: 
        condition: services_healthy
    ports:
      - "8000:8000"
    command: ["pythong", "-m", "engine.cil", "api", "0.0.0.0", "--port", "8000"]
